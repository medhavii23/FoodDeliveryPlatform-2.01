server:
  port: 9091

spring:
  application:
    name: H2-SERVER
  datasource:
    url: jdbc:h2:file:./data/foodplatform;DB_CLOSE_DELAY=-1;IFEXISTS=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
